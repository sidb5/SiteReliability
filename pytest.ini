[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py eval_*.py
addopts =
    -v
    --cov=.
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    eval: evaluation tests for precision/recall, latency, and isolation metrics
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

[coverage:run]
omit =
    tests/*
    migrations/*
    scripts/*
    */site-packages/*
